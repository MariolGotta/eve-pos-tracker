services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eve_pos_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: .env
    ports:
      - "45000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eve_pos_tracker

volumes:
  postgres_data:
